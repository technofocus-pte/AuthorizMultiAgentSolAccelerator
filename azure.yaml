# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: prior-auth-maf
metadata:
  template: prior-auth-maf@1.0
requiredVersions:
  azd: '>= 1.18.0'

hooks:
  preprovision:
    windows:
      run: |
        # Validate region — Claude models only available in East US 2 and Sweden Central
        $region = azd env get-value AZURE_LOCATION 2>$null
        if ($region -and $region -notin @('eastus2', 'swedencentral')) {
          Write-Host ""
          Write-Host "===============================================================" -ForegroundColor Red
          Write-Host " REGION NOT SUPPORTED" -ForegroundColor Red
          Write-Host "===============================================================" -ForegroundColor Red
          Write-Host ""
          Write-Host " You selected region: $region" -ForegroundColor Yellow
          Write-Host ""
          Write-Host " Claude models on Microsoft Foundry are only available in:" -ForegroundColor White
          Write-Host "   - East US 2      (eastus2)" -ForegroundColor Cyan
          Write-Host "   - Sweden Central (swedencentral)" -ForegroundColor Cyan
          Write-Host ""
          Write-Host " Please run 'azd env new' and select a supported region," -ForegroundColor White
          Write-Host " or change region with: azd env set AZURE_LOCATION eastus2" -ForegroundColor White
          Write-Host ""
          Write-Host " Learn more: https://learn.microsoft.com/en-us/azure/foundry/foundry-models/how-to/use-foundry-models-claude" -ForegroundColor Gray
          Write-Host ""
          exit 1
        }
        # Always provision with placeholder images; postprovision builds real ones
        azd env set IMAGES_BUILT false
      shell: pwsh
    posix:
      run: |
        # Validate region — Claude models only available in East US 2 and Sweden Central
        REGION=$(azd env get-value AZURE_LOCATION 2>/dev/null)
        if [ -n "$REGION" ] && [ "$REGION" != "eastus2" ] && [ "$REGION" != "swedencentral" ]; then
          Red='\033[0;31m'
          Yellow='\033[1;33m'
          Cyan='\033[0;36m'
          White='\033[1;37m'
          Gray='\033[0;90m'
          NC='\033[0m'
          printf "\n"
          printf "${Red}===============================================================\n"
          printf "${Red} REGION NOT SUPPORTED\n"
          printf "${Red}===============================================================${NC}\n\n"
          printf "${Yellow} You selected region: %s${NC}\n\n" "$REGION"
          printf "${White} Claude models on Microsoft Foundry are only available in:${NC}\n"
          printf "${Cyan}   - East US 2      (eastus2)${NC}\n"
          printf "${Cyan}   - Sweden Central (swedencentral)${NC}\n\n"
          printf "${White} Please run 'azd env new' and select a supported region,${NC}\n"
          printf "${White} or change region with: azd env set AZURE_LOCATION eastus2${NC}\n\n"
          printf "${Gray} Learn more: https://learn.microsoft.com/en-us/azure/foundry/foundry-models/how-to/use-foundry-models-claude${NC}\n\n"
          exit 1
        fi
        azd env set IMAGES_BUILT false
      shell: sh

  postprovision:
    windows:
      run: |
        Write-Host ""
        Write-Host "===============================================================" -ForegroundColor Yellow
        Write-Host " BUILDING CONTAINER IMAGES (remote ACR build)" -ForegroundColor Green
        Write-Host "===============================================================" -ForegroundColor Yellow

        $acrEndpoint = azd env get-value AZURE_CONTAINER_REGISTRY_ENDPOINT
        $acrName     = $acrEndpoint -replace '\.azurecr\.io$', ''
        $rgName      = azd env get-value AZURE_RESOURCE_GROUP
        $backendApp  = azd env get-value BACKEND_CONTAINER_APP_NAME
        $frontendApp = azd env get-value FRONTEND_CONTAINER_APP_NAME

        Write-Host ""
        Write-Host "  Building backend on ACR ($acrName)..." -ForegroundColor White
        $ErrorActionPreference = 'SilentlyContinue'
        $backendBuild = az acr build --registry $acrName --image backend:latest --platform linux/amd64 ./backend --no-logs 2>&1
        $backendExit = $LASTEXITCODE
        $ErrorActionPreference = 'Continue'
        if ($backendExit -ne 0) { Write-Host "  ERROR: Backend build failed!" -ForegroundColor Red; exit 1 }
        Write-Host "  Backend image built successfully" -ForegroundColor Green

        Write-Host "  Building frontend on ACR ($acrName)..." -ForegroundColor White
        $ErrorActionPreference = 'SilentlyContinue'
        $frontendBuild = az acr build --registry $acrName --image frontend:latest --platform linux/amd64 ./frontend --no-logs 2>&1
        $frontendExit = $LASTEXITCODE
        $ErrorActionPreference = 'Continue'
        if ($frontendExit -ne 0) { Write-Host "  ERROR: Frontend build failed!" -ForegroundColor Red; exit 1 }
        Write-Host "  Frontend image built successfully" -ForegroundColor Green

        Write-Host ""
        Write-Host "  Updating backend container app..." -ForegroundColor White
        $ErrorActionPreference = 'SilentlyContinue'
        az containerapp update --name $backendApp --resource-group $rgName --image "$acrEndpoint/backend:latest" --output none 2>&1 | Out-Null
        az containerapp update --name $frontendApp --resource-group $rgName --image "$acrEndpoint/frontend:latest" --output none 2>&1 | Out-Null
        $ErrorActionPreference = 'Continue'
        Write-Host "  Updating frontend container app..." -ForegroundColor White

        # Mark images as built so subsequent provisions use ACR images directly
        azd env set IMAGES_BUILT true

        Write-Host ""
        Write-Host "===============================================================" -ForegroundColor Yellow
        Write-Host " DEPLOYMENT COMPLETE" -ForegroundColor Green
        Write-Host "===============================================================" -ForegroundColor Yellow
        Write-Host ""
        Write-Host " Next Steps:" -ForegroundColor White
        Write-Host "  1. Deploy Claude Sonnet 4.6 in AI Foundry portal" -ForegroundColor White
        Write-Host "  2. Set credentials:" -ForegroundColor White
        Write-Host "     azd env set AZURE_FOUNDRY_API_KEY <your-api-key>" -ForegroundColor Gray
        Write-Host "     azd env set AZURE_FOUNDRY_ENDPOINT <your-endpoint>" -ForegroundColor Gray
        Write-Host "  3. Redeploy: azd up" -ForegroundColor White
        Write-Host ""
        $frontendUrl = azd env get-value frontendUrl
        $backendUrl  = azd env get-value backendUrl
        Write-Host " Application URLs:" -ForegroundColor Yellow
        Write-Host "  Frontend:  https://$frontendUrl" -ForegroundColor Cyan
        Write-Host "  Backend:   https://$backendUrl" -ForegroundColor Cyan
        Write-Host ""
        Write-Host " To submit a Prior Authorization request:" -ForegroundColor Green
        Write-Host "  1. Open the Frontend URL above in your browser" -ForegroundColor White
        Write-Host "  2. Click 'Load Sample Case' to populate the form" -ForegroundColor White
        Write-Host "  3. Click 'Submit for Review' to start the multi-agent review" -ForegroundColor White
        Write-Host ""
        Write-Host " Backend Health Check: https://$backendUrl/health" -ForegroundColor Gray
        Write-Host ""
      shell: pwsh
      interactive: true
    posix:
      run: |
        Green='\033[0;32m'
        Yellow='\033[1;33m'
        Blue='\033[0;34m'
        Red='\033[0;31m'
        White='\033[1;37m'
        NC='\033[0m'

        printf "\n"
        printf "${Yellow}===============================================================\n"
        printf "${Green} BUILDING CONTAINER IMAGES (remote ACR build)\n"
        printf "${Yellow}===============================================================${NC}\n"

        ACR_ENDPOINT=$(azd env get-value AZURE_CONTAINER_REGISTRY_ENDPOINT)
        ACR_NAME=$(echo "$ACR_ENDPOINT" | sed 's/\.azurecr\.io$//')
        RG_NAME=$(azd env get-value AZURE_RESOURCE_GROUP)
        BACKEND_APP=$(azd env get-value BACKEND_CONTAINER_APP_NAME)
        FRONTEND_APP=$(azd env get-value FRONTEND_CONTAINER_APP_NAME)

        printf "\n${White}  Building backend on ACR (%s)...${NC}\n" "$ACR_NAME"
        az acr build --registry "$ACR_NAME" --image backend:latest --platform linux/amd64 ./backend --no-logs 2>/dev/null
        if [ $? -ne 0 ]; then printf "${Red}  ERROR: Backend build failed!${NC}\n"; exit 1; fi
        printf "${Green}  Backend image built successfully${NC}\n"

        printf "${White}  Building frontend on ACR (%s)...${NC}\n" "$ACR_NAME"
        az acr build --registry "$ACR_NAME" --image frontend:latest --platform linux/amd64 ./frontend --no-logs 2>/dev/null
        if [ $? -ne 0 ]; then printf "${Red}  ERROR: Frontend build failed!${NC}\n"; exit 1; fi
        printf "${Green}  Frontend image built successfully${NC}\n"

        printf "\n${White}  Updating backend container app...${NC}\n"
        az containerapp update --name "$BACKEND_APP" --resource-group "$RG_NAME" --image "$ACR_ENDPOINT/backend:latest" --output none 2>/dev/null
        printf "${White}  Updating frontend container app...${NC}\n"
        az containerapp update --name "$FRONTEND_APP" --resource-group "$RG_NAME" --image "$ACR_ENDPOINT/frontend:latest" --output none 2>/dev/null

        azd env set IMAGES_BUILT true

        printf "\n"
        printf "${Yellow}===============================================================\n"
        printf "${Green} DEPLOYMENT COMPLETE\n"
        printf "${Yellow}===============================================================${NC}\n\n"
        printf "${White} Next Steps:${NC}\n"
        printf "  1. Deploy Claude Sonnet 4.6 in AI Foundry portal\n"
        printf "  2. Set credentials:\n"
        printf "${Gray}     azd env set AZURE_FOUNDRY_API_KEY <your-api-key>${NC}\n"
        printf "${Gray}     azd env set AZURE_FOUNDRY_ENDPOINT <your-endpoint>${NC}\n"
        printf "  3. Redeploy: azd up\n\n"
        FRONTEND_URL=$(azd env get-value frontendUrl)
        BACKEND_URL=$(azd env get-value backendUrl)
        printf "${Yellow} Application URLs:${NC}\n"
        printf "${Blue}  Frontend:  https://%s${NC}\n" "$FRONTEND_URL"
        printf "${Blue}  Backend:   https://%s${NC}\n\n" "$BACKEND_URL"
        printf "${Green} To submit a Prior Authorization request:${NC}\n"
        printf "  1. Open the Frontend URL above in your browser\n"
        printf "  2. Click 'Load Sample Case' to populate the form\n"
        printf "  3. Click 'Submit for Review' to start the multi-agent review\n\n"
        printf "${Gray} Backend Health Check: https://%s/health${NC}\n\n" "$BACKEND_URL"
      shell: sh
      interactive: true
