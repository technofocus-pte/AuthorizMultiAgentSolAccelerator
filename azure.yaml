# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: prior-auth-maf
metadata:
  template: prior-auth-maf@1.0
requiredVersions:
  azd: '>= 1.18.0'

hooks:
  preprovision:
    windows:
      run: |
        # ── Region Validation ────────────────────────────────────────
        $region = azd env get-value AZURE_LOCATION 2>$null
        if ($region -and $region -notin @('eastus2', 'swedencentral')) {
          Write-Host ""
          Write-Host "===============================================================" -ForegroundColor Red
          Write-Host " REGION NOT SUPPORTED" -ForegroundColor Red
          Write-Host "===============================================================" -ForegroundColor Red
          Write-Host ""
          Write-Host " You selected region: $region" -ForegroundColor Yellow
          Write-Host ""
          Write-Host " Claude models on Microsoft Foundry are only available in:" -ForegroundColor White
          Write-Host "   - East US 2      (eastus2)" -ForegroundColor Cyan
          Write-Host "   - Sweden Central (swedencentral)" -ForegroundColor Cyan
          Write-Host ""
          Write-Host " Please run 'azd env new' and select a supported region," -ForegroundColor White
          Write-Host " or change region with: azd env set AZURE_LOCATION eastus2" -ForegroundColor White
          Write-Host ""
          Write-Host " Learn more: https://learn.microsoft.com/en-us/azure/foundry/foundry-models/how-to/use-foundry-models-claude" -ForegroundColor Gray
          Write-Host ""
          exit 1
        }

        # ── Pre-Deployment Quota & Provider Check ────────────────────
        if ($region) {
          Write-Host ""
          Write-Host "===============================================================" -ForegroundColor Yellow
          Write-Host " PRE-DEPLOYMENT VERIFICATION" -ForegroundColor Green
          Write-Host "===============================================================" -ForegroundColor Yellow
          Write-Host ""

          $subId = az account show --query "id" -o tsv 2>$null
          $subName = az account show --query "name" -o tsv 2>$null
          Write-Host " Subscription: $subName" -ForegroundColor White
          Write-Host " Region:       $region" -ForegroundColor White
          Write-Host ""

          # Check required resource providers
          Write-Host " Checking resource providers..." -ForegroundColor White
          $providers = @(
            @{ Name = "Microsoft.App";                     Desc = "Container Apps" },
            @{ Name = "Microsoft.ContainerRegistry";       Desc = "Container Registry" },
            @{ Name = "Microsoft.MachineLearningServices"; Desc = "AI Foundry" },
            @{ Name = "Microsoft.Storage";                 Desc = "Storage Account" },
            @{ Name = "Microsoft.KeyVault";                Desc = "Key Vault" },
            @{ Name = "Microsoft.OperationalInsights";     Desc = "Log Analytics" },
            @{ Name = "Microsoft.Insights";                Desc = "Application Insights" }
          )

          $providerIssues = @()
          foreach ($p in $providers) {
            $state = az provider show -n $p.Name --query "registrationState" -o tsv 2>$null
            if ($state -eq "Registered") {
              Write-Host "   [OK] $($p.Desc) ($($p.Name))" -ForegroundColor Green
            } else {
              Write-Host "   [!!] $($p.Desc) ($($p.Name)) - $state" -ForegroundColor Red
              $providerIssues += $p
            }
          }

          # Auto-register unregistered providers
          if ($providerIssues.Count -gt 0) {
            Write-Host ""
            Write-Host " Registering missing providers..." -ForegroundColor Yellow
            foreach ($p in $providerIssues) {
              Write-Host "   Registering $($p.Name)..." -ForegroundColor White -NoNewline
              az provider register -n $p.Name --wait 2>$null
              $state = az provider show -n $p.Name --query "registrationState" -o tsv 2>$null
              if ($state -eq "Registered") {
                Write-Host " OK" -ForegroundColor Green
              } else {
                Write-Host " FAILED ($state)" -ForegroundColor Red
                Write-Host ""
                Write-Host " ERROR: Cannot register $($p.Name)." -ForegroundColor Red
                Write-Host " You may need 'Contributor' or 'Owner' role on the subscription." -ForegroundColor Yellow
                Write-Host ""
                exit 1
              }
            }
          }

          # Check Container Apps quota
          Write-Host ""
          Write-Host " Checking resource quotas..." -ForegroundColor White

          $ErrorActionPreference = 'SilentlyContinue'
          $caEnvUsage = az containerapp env list --query "length([?location=='$region'])" -o tsv 2>$null
          $ErrorActionPreference = 'Continue'
          if ($null -eq $caEnvUsage) { $caEnvUsage = 0 }
          $caEnvLimit = 15
          $caEnvRemaining = $caEnvLimit - [int]$caEnvUsage

          # Check Container Registry quota
          $ErrorActionPreference = 'SilentlyContinue'
          $acrUsage = az acr list --query "length([?location=='$region'])" -o tsv 2>$null
          $ErrorActionPreference = 'Continue'
          if ($null -eq $acrUsage) { $acrUsage = 0 }

          # Check ML Workspace (AI Foundry) quota
          $ErrorActionPreference = 'SilentlyContinue'
          $mlUsage = az ml workspace list --query "length([?location=='$region'])" -o tsv 2>$null
          $ErrorActionPreference = 'Continue'
          if ($null -eq $mlUsage) { $mlUsage = 0 }

          # Display quota summary
          Write-Host ""
          Write-Host " Resource Quota Summary ($region):" -ForegroundColor Yellow
          Write-Host " ┌────────────────────────────────┬────────┬────────┐" -ForegroundColor Gray
          Write-Host " │ Resource                       │ In Use │ Status │" -ForegroundColor Gray
          Write-Host " ├────────────────────────────────┼────────┼────────┤" -ForegroundColor Gray

          # Container Apps Environments
          if ($caEnvRemaining -gt 0) {
            Write-Host " │ Container Apps Environments    │ $($caEnvUsage.ToString().PadLeft(6)) │  " -ForegroundColor Gray -NoNewline
            Write-Host "OK" -ForegroundColor Green -NoNewline
            Write-Host "  │" -ForegroundColor Gray
          } else {
            Write-Host " │ Container Apps Environments    │ $($caEnvUsage.ToString().PadLeft(6)) │ " -ForegroundColor Gray -NoNewline
            Write-Host "FULL" -ForegroundColor Red -NoNewline
            Write-Host " │" -ForegroundColor Gray
          }

          # Container Registries
          Write-Host " │ Container Registries           │ $($acrUsage.ToString().PadLeft(6)) │  " -ForegroundColor Gray -NoNewline
          Write-Host "OK" -ForegroundColor Green -NoNewline
          Write-Host "  │" -ForegroundColor Gray

          # AI Foundry Workspaces
          Write-Host " │ AI Foundry Workspaces          │ $($mlUsage.ToString().PadLeft(6)) │  " -ForegroundColor Gray -NoNewline
          Write-Host "OK" -ForegroundColor Green -NoNewline
          Write-Host "  │" -ForegroundColor Gray

          Write-Host " └────────────────────────────────┴────────┴────────┘" -ForegroundColor Gray

          if ($caEnvRemaining -le 0) {
            Write-Host ""
            Write-Host " WARNING: Container Apps Environment quota may be exhausted!" -ForegroundColor Red
            Write-Host " You have $caEnvUsage/$caEnvLimit environments in $region." -ForegroundColor Yellow
            Write-Host " Delete unused environments or request a quota increase." -ForegroundColor Yellow
            Write-Host " Azure Portal: https://portal.azure.com/#view/Microsoft_Azure_Capacity/QuotaMenuBlade" -ForegroundColor Gray
            Write-Host ""
          }

          # Resources to be created
          Write-Host ""
          Write-Host " Resources to be created:" -ForegroundColor Yellow
          Write-Host "   • Resource Group" -ForegroundColor White
          Write-Host "   • AI Foundry Hub + Project (+ Storage Account, Key Vault)" -ForegroundColor White
          Write-Host "   • Container Registry" -ForegroundColor White
          Write-Host "   • Container Apps Environment" -ForegroundColor White
          Write-Host "   • Backend Container App (Python/FastAPI)" -ForegroundColor White
          Write-Host "   • Frontend Container App (Next.js/nginx)" -ForegroundColor White
          Write-Host "   • Log Analytics + Application Insights" -ForegroundColor White
          Write-Host ""
          Write-Host "===============================================================" -ForegroundColor Yellow

          # Ask for confirmation
          $confirm = Read-Host " Proceed with deployment? (Y/n)"
          if ($confirm -and $confirm -notin @('y', 'Y', 'yes', 'Yes', 'YES', '')) {
            Write-Host ""
            Write-Host " Deployment cancelled by user." -ForegroundColor Yellow
            Write-Host ""
            exit 1
          }
          Write-Host ""
        }

        # Always provision with placeholder images; postprovision builds real ones
        azd env set IMAGES_BUILT false
      shell: pwsh
      interactive: true
    posix:
      run: |
        # ── Region Validation ────────────────────────────────────────
        REGION=$(azd env get-value AZURE_LOCATION 2>/dev/null)
        if [ -n "$REGION" ] && [ "$REGION" != "eastus2" ] && [ "$REGION" != "swedencentral" ]; then
          Red='\033[0;31m'
          Yellow='\033[1;33m'
          Cyan='\033[0;36m'
          White='\033[1;37m'
          Gray='\033[0;90m'
          NC='\033[0m'
          printf "\n"
          printf "${Red}===============================================================\n"
          printf "${Red} REGION NOT SUPPORTED\n"
          printf "${Red}===============================================================${NC}\n\n"
          printf "${Yellow} You selected region: %s${NC}\n\n" "$REGION"
          printf "${White} Claude models on Microsoft Foundry are only available in:${NC}\n"
          printf "${Cyan}   - East US 2      (eastus2)${NC}\n"
          printf "${Cyan}   - Sweden Central (swedencentral)${NC}\n\n"
          printf "${White} Please run 'azd env new' and select a supported region,${NC}\n"
          printf "${White} or change region with: azd env set AZURE_LOCATION eastus2${NC}\n\n"
          printf "${Gray} Learn more: https://learn.microsoft.com/en-us/azure/foundry/foundry-models/how-to/use-foundry-models-claude${NC}\n\n"
          exit 1
        fi

        # ── Pre-Deployment Quota & Provider Check ────────────────────
        if [ -n "$REGION" ]; then
          Green='\033[0;32m'
          Yellow='\033[1;33m'
          Red='\033[0;31m'
          White='\033[1;37m'
          Cyan='\033[0;36m'
          Gray='\033[0;90m'
          NC='\033[0m'

          printf "\n"
          printf "${Yellow}===============================================================\n"
          printf "${Green} PRE-DEPLOYMENT VERIFICATION\n"
          printf "${Yellow}===============================================================${NC}\n\n"

          SUB_ID=$(az account show --query "id" -o tsv 2>/dev/null)
          SUB_NAME=$(az account show --query "name" -o tsv 2>/dev/null)
          printf "${White} Subscription: %s${NC}\n" "$SUB_NAME"
          printf "${White} Region:       %s${NC}\n\n" "$REGION"

          # Check required resource providers
          printf "${White} Checking resource providers...${NC}\n"
          PROVIDER_FAILED=0
          for PROVIDER_INFO in \
            "Microsoft.App|Container Apps" \
            "Microsoft.ContainerRegistry|Container Registry" \
            "Microsoft.MachineLearningServices|AI Foundry" \
            "Microsoft.Storage|Storage Account" \
            "Microsoft.KeyVault|Key Vault" \
            "Microsoft.OperationalInsights|Log Analytics" \
            "Microsoft.Insights|Application Insights"; do

            PNAME=$(echo "$PROVIDER_INFO" | cut -d'|' -f1)
            PDESC=$(echo "$PROVIDER_INFO" | cut -d'|' -f2)
            STATE=$(az provider show -n "$PNAME" --query "registrationState" -o tsv 2>/dev/null)

            if [ "$STATE" = "Registered" ]; then
              printf "${Green}   [OK] %s (%s)${NC}\n" "$PDESC" "$PNAME"
            else
              printf "${Red}   [!!] %s (%s) - %s${NC}\n" "$PDESC" "$PNAME" "$STATE"
              printf "${Yellow}   Registering %s...${NC}" "$PNAME"
              az provider register -n "$PNAME" --wait 2>/dev/null
              STATE=$(az provider show -n "$PNAME" --query "registrationState" -o tsv 2>/dev/null)
              if [ "$STATE" = "Registered" ]; then
                printf "${Green} OK${NC}\n"
              else
                printf "${Red} FAILED (%s)${NC}\n" "$STATE"
                printf "\n${Red} ERROR: Cannot register %s.${NC}\n" "$PNAME"
                printf "${Yellow} You may need 'Contributor' or 'Owner' role on the subscription.${NC}\n\n"
                PROVIDER_FAILED=1
              fi
            fi
          done

          if [ "$PROVIDER_FAILED" = "1" ]; then
            exit 1
          fi

          # Check resource quotas
          printf "\n${White} Checking resource quotas...${NC}\n"

          CA_ENV_USAGE=$(az containerapp env list --query "length([?location=='$REGION'])" -o tsv 2>/dev/null || echo "0")
          ACR_USAGE=$(az acr list --query "length([?location=='$REGION'])" -o tsv 2>/dev/null || echo "0")
          ML_USAGE=$(az ml workspace list --query "length([?location=='$REGION'])" -o tsv 2>/dev/null || echo "0")
          CA_ENV_LIMIT=15

          # Display quota summary
          printf "\n${Yellow} Resource Quota Summary (%s):${NC}\n" "$REGION"
          printf "${Gray} ┌────────────────────────────────┬────────┬────────┐${NC}\n"
          printf "${Gray} │ Resource                       │ In Use │ Status │${NC}\n"
          printf "${Gray} ├────────────────────────────────┼────────┼────────┤${NC}\n"

          CA_REMAINING=$((CA_ENV_LIMIT - CA_ENV_USAGE))
          if [ "$CA_REMAINING" -gt 0 ]; then
            printf "${Gray} │ Container Apps Environments    │ %6s │  ${Green}OK${Gray}  │${NC}\n" "$CA_ENV_USAGE"
          else
            printf "${Gray} │ Container Apps Environments    │ %6s │ ${Red}FULL${Gray} │${NC}\n" "$CA_ENV_USAGE"
          fi
          printf "${Gray} │ Container Registries           │ %6s │  ${Green}OK${Gray}  │${NC}\n" "$ACR_USAGE"
          printf "${Gray} │ AI Foundry Workspaces          │ %6s │  ${Green}OK${Gray}  │${NC}\n" "$ML_USAGE"
          printf "${Gray} └────────────────────────────────┴────────┴────────┘${NC}\n"

          if [ "$CA_REMAINING" -le 0 ]; then
            printf "\n${Red} WARNING: Container Apps Environment quota may be exhausted!${NC}\n"
            printf "${Yellow} You have %s/%s environments in %s.${NC}\n" "$CA_ENV_USAGE" "$CA_ENV_LIMIT" "$REGION"
            printf "${Yellow} Delete unused environments or request a quota increase.${NC}\n"
            printf "${Gray} Azure Portal: https://portal.azure.com/#view/Microsoft_Azure_Capacity/QuotaMenuBlade${NC}\n\n"
          fi

          # Resources to be created
          printf "\n${Yellow} Resources to be created:${NC}\n"
          printf "   • Resource Group\n"
          printf "   • AI Foundry Hub + Project (+ Storage Account, Key Vault)\n"
          printf "   • Container Registry\n"
          printf "   • Container Apps Environment\n"
          printf "   • Backend Container App (Python/FastAPI)\n"
          printf "   • Frontend Container App (Next.js/nginx)\n"
          printf "   • Log Analytics + Application Insights\n"
          printf "\n${Yellow}===============================================================${NC}\n"

          # Ask for confirmation
          printf " Proceed with deployment? (Y/n) "
          read -r CONFIRM
          if [ -n "$CONFIRM" ] && [ "$CONFIRM" != "y" ] && [ "$CONFIRM" != "Y" ] && [ "$CONFIRM" != "yes" ]; then
            printf "\n${Yellow} Deployment cancelled by user.${NC}\n\n"
            exit 1
          fi
          printf "\n"
        fi

        azd env set IMAGES_BUILT false
      shell: sh
      interactive: true

  postprovision:
    windows:
      run: |
        Write-Host ""
        Write-Host "===============================================================" -ForegroundColor Yellow
        Write-Host " BUILDING CONTAINER IMAGES (remote ACR build)" -ForegroundColor Green
        Write-Host "===============================================================" -ForegroundColor Yellow

        $acrEndpoint = azd env get-value AZURE_CONTAINER_REGISTRY_ENDPOINT
        $acrName     = $acrEndpoint -replace '\.azurecr\.io$', ''
        $rgName      = azd env get-value AZURE_RESOURCE_GROUP
        $backendApp  = azd env get-value BACKEND_CONTAINER_APP_NAME
        $frontendApp = azd env get-value FRONTEND_CONTAINER_APP_NAME

        Write-Host ""
        Write-Host "  Building backend on ACR ($acrName)..." -ForegroundColor White
        $ErrorActionPreference = 'SilentlyContinue'
        $backendBuild = az acr build --registry $acrName --image backend:latest --platform linux/amd64 ./backend --no-logs 2>&1
        $backendExit = $LASTEXITCODE
        $ErrorActionPreference = 'Continue'
        if ($backendExit -ne 0) { Write-Host "  ERROR: Backend build failed!" -ForegroundColor Red; exit 1 }
        Write-Host "  Backend image built successfully" -ForegroundColor Green

        Write-Host "  Building frontend on ACR ($acrName)..." -ForegroundColor White
        $ErrorActionPreference = 'SilentlyContinue'
        $frontendBuild = az acr build --registry $acrName --image frontend:latest --platform linux/amd64 ./frontend --no-logs 2>&1
        $frontendExit = $LASTEXITCODE
        $ErrorActionPreference = 'Continue'
        if ($frontendExit -ne 0) { Write-Host "  ERROR: Frontend build failed!" -ForegroundColor Red; exit 1 }
        Write-Host "  Frontend image built successfully" -ForegroundColor Green

        Write-Host ""
        Write-Host "  Updating backend container app..." -ForegroundColor White
        $ErrorActionPreference = 'SilentlyContinue'
        az containerapp update --name $backendApp --resource-group $rgName --image "$acrEndpoint/backend:latest" --output none 2>&1 | Out-Null
        az containerapp update --name $frontendApp --resource-group $rgName --image "$acrEndpoint/frontend:latest" --output none 2>&1 | Out-Null
        $ErrorActionPreference = 'Continue'
        Write-Host "  Updating frontend container app..." -ForegroundColor White

        # Mark images as built so subsequent provisions use ACR images directly
        azd env set IMAGES_BUILT true

        Write-Host ""
        Write-Host "===============================================================" -ForegroundColor Yellow
        Write-Host " DEPLOYMENT COMPLETE" -ForegroundColor Green
        Write-Host "===============================================================" -ForegroundColor Yellow
        Write-Host ""
        Write-Host " Next Steps:" -ForegroundColor White
        Write-Host "  1. Deploy Claude Sonnet 4.6 in AI Foundry portal" -ForegroundColor White
        Write-Host "  2. Set credentials:" -ForegroundColor White
        Write-Host "     azd env set AZURE_FOUNDRY_API_KEY <your-api-key>" -ForegroundColor Gray
        Write-Host "     azd env set AZURE_FOUNDRY_ENDPOINT <your-endpoint>" -ForegroundColor Gray
        Write-Host "  3. Redeploy: azd up" -ForegroundColor White
        Write-Host ""
        $frontendUrl = azd env get-value frontendUrl
        $backendUrl  = azd env get-value backendUrl
        Write-Host " Application URLs:" -ForegroundColor Yellow
        Write-Host "  Frontend:  https://$frontendUrl" -ForegroundColor Cyan
        Write-Host "  Backend:   https://$backendUrl" -ForegroundColor Cyan
        Write-Host ""
        Write-Host " To submit a Prior Authorization request:" -ForegroundColor Green
        Write-Host "  1. Open the Frontend URL above in your browser" -ForegroundColor White
        Write-Host "  2. Click 'Load Sample Case' to populate the form" -ForegroundColor White
        Write-Host "  3. Click 'Submit for Review' to start the multi-agent review" -ForegroundColor White
        Write-Host ""
        Write-Host " Backend Health Check: https://$backendUrl/health" -ForegroundColor Gray
        Write-Host ""
      shell: pwsh
      interactive: true
    posix:
      run: |
        Green='\033[0;32m'
        Yellow='\033[1;33m'
        Blue='\033[0;34m'
        Red='\033[0;31m'
        White='\033[1;37m'
        NC='\033[0m'

        printf "\n"
        printf "${Yellow}===============================================================\n"
        printf "${Green} BUILDING CONTAINER IMAGES (remote ACR build)\n"
        printf "${Yellow}===============================================================${NC}\n"

        ACR_ENDPOINT=$(azd env get-value AZURE_CONTAINER_REGISTRY_ENDPOINT)
        ACR_NAME=$(echo "$ACR_ENDPOINT" | sed 's/\.azurecr\.io$//')
        RG_NAME=$(azd env get-value AZURE_RESOURCE_GROUP)
        BACKEND_APP=$(azd env get-value BACKEND_CONTAINER_APP_NAME)
        FRONTEND_APP=$(azd env get-value FRONTEND_CONTAINER_APP_NAME)

        printf "\n${White}  Building backend on ACR (%s)...${NC}\n" "$ACR_NAME"
        az acr build --registry "$ACR_NAME" --image backend:latest --platform linux/amd64 ./backend --no-logs 2>/dev/null
        if [ $? -ne 0 ]; then printf "${Red}  ERROR: Backend build failed!${NC}\n"; exit 1; fi
        printf "${Green}  Backend image built successfully${NC}\n"

        printf "${White}  Building frontend on ACR (%s)...${NC}\n" "$ACR_NAME"
        az acr build --registry "$ACR_NAME" --image frontend:latest --platform linux/amd64 ./frontend --no-logs 2>/dev/null
        if [ $? -ne 0 ]; then printf "${Red}  ERROR: Frontend build failed!${NC}\n"; exit 1; fi
        printf "${Green}  Frontend image built successfully${NC}\n"

        printf "\n${White}  Updating backend container app...${NC}\n"
        az containerapp update --name "$BACKEND_APP" --resource-group "$RG_NAME" --image "$ACR_ENDPOINT/backend:latest" --output none 2>/dev/null
        printf "${White}  Updating frontend container app...${NC}\n"
        az containerapp update --name "$FRONTEND_APP" --resource-group "$RG_NAME" --image "$ACR_ENDPOINT/frontend:latest" --output none 2>/dev/null

        azd env set IMAGES_BUILT true

        printf "\n"
        printf "${Yellow}===============================================================\n"
        printf "${Green} DEPLOYMENT COMPLETE\n"
        printf "${Yellow}===============================================================${NC}\n\n"
        printf "${White} Next Steps:${NC}\n"
        printf "  1. Deploy Claude Sonnet 4.6 in AI Foundry portal\n"
        printf "  2. Set credentials:\n"
        printf "${Gray}     azd env set AZURE_FOUNDRY_API_KEY <your-api-key>${NC}\n"
        printf "${Gray}     azd env set AZURE_FOUNDRY_ENDPOINT <your-endpoint>${NC}\n"
        printf "  3. Redeploy: azd up\n\n"
        FRONTEND_URL=$(azd env get-value frontendUrl)
        BACKEND_URL=$(azd env get-value backendUrl)
        printf "${Yellow} Application URLs:${NC}\n"
        printf "${Blue}  Frontend:  https://%s${NC}\n" "$FRONTEND_URL"
        printf "${Blue}  Backend:   https://%s${NC}\n\n" "$BACKEND_URL"
        printf "${Green} To submit a Prior Authorization request:${NC}\n"
        printf "  1. Open the Frontend URL above in your browser\n"
        printf "  2. Click 'Load Sample Case' to populate the form\n"
        printf "  3. Click 'Submit for Review' to start the multi-agent review\n\n"
        printf "${Gray} Backend Health Check: https://%s/health${NC}\n\n" "$BACKEND_URL"
      shell: sh
      interactive: true
