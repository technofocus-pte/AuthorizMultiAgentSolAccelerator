# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: prior-auth-maf
metadata:
  template: prior-auth-maf@1.0
requiredVersions:
  azd: '>= 1.18.0'

hooks:
  preprovision:
    windows:
      run: |
        # ── Region Validation ────────────────────────────────────────
        $region = azd env get-value AZURE_LOCATION 2>$null
        if ($region -and $region -notin @('eastus2', 'swedencentral')) {
          Write-Host ""
          Write-Host "===============================================================" -ForegroundColor Red
          Write-Host " REGION NOT SUPPORTED" -ForegroundColor Red
          Write-Host "===============================================================" -ForegroundColor Red
          Write-Host ""
          Write-Host " You selected region: $region" -ForegroundColor Yellow
          Write-Host ""
          Write-Host " Claude models on Microsoft Foundry are only available in:" -ForegroundColor White
          Write-Host "   - East US 2      (eastus2)" -ForegroundColor Cyan
          Write-Host "   - Sweden Central (swedencentral)" -ForegroundColor Cyan
          Write-Host ""
          Write-Host " Please run 'azd env new' and select a supported region," -ForegroundColor White
          Write-Host " or change region with: azd env set AZURE_LOCATION eastus2" -ForegroundColor White
          Write-Host ""
          Write-Host " Learn more: https://learn.microsoft.com/en-us/azure/foundry/foundry-models/how-to/use-foundry-models-claude" -ForegroundColor Gray
          Write-Host ""
          exit 1
        }

        # ── Pre-Deployment Verification ────────────────────────────
        if ($region) {
          Write-Host ""
          Write-Host "===============================================================" -ForegroundColor Yellow
          Write-Host " PRE-DEPLOYMENT VERIFICATION" -ForegroundColor Green
          Write-Host "===============================================================" -ForegroundColor Yellow
          Write-Host ""

          $hasErrors = $false

          # ── 1. Azure CLI Login & Token Validity ──────────────────
          Write-Host " [1/7] Checking Azure CLI authentication..." -ForegroundColor White
          $ErrorActionPreference = 'SilentlyContinue'
          $tokenCheck = az account get-access-token --query "expiresOn" -o tsv 2>&1
          $ErrorActionPreference = 'Continue'
          if ($LASTEXITCODE -ne 0) {
            Write-Host "   [!!] Azure CLI token expired or not logged in" -ForegroundColor Red
            Write-Host "   Run: az login" -ForegroundColor Yellow
            Write-Host ""
            exit 1
          }
          $subId = az account show --query "id" -o tsv 2>$null
          $subName = az account show --query "name" -o tsv 2>$null
          $subState = az account show --query "state" -o tsv 2>$null
          Write-Host "   [OK] Logged in" -ForegroundColor Green
          Write-Host "   Subscription: $subName" -ForegroundColor Gray
          Write-Host "   Region:       $region" -ForegroundColor Gray

          # Check subscription state
          if ($subState -ne "Enabled") {
            Write-Host ""
            Write-Host "   [!!] Subscription state: $subState" -ForegroundColor Red
            Write-Host "   Your subscription must be in 'Enabled' state to deploy." -ForegroundColor Yellow
            Write-Host "   Check: https://portal.azure.com/#view/Microsoft_Azure_Billing/SubscriptionsBlade" -ForegroundColor Gray
            Write-Host ""
            exit 1
          }

          # ── 2. Role Assignment Check ─────────────────────────────
          Write-Host ""
          Write-Host " [2/7] Checking permissions..." -ForegroundColor White
          $ErrorActionPreference = 'SilentlyContinue'
          $userOid = az ad signed-in-user show --query "id" -o tsv 2>$null
          $ErrorActionPreference = 'Continue'
          if ($userOid) {
            $roles = az role assignment list --assignee $userOid --subscription $subId --query "[].roleDefinitionName" -o tsv 2>$null
            if ($roles -match "Owner|Contributor") {
              Write-Host "   [OK] Sufficient permissions (Contributor or Owner)" -ForegroundColor Green
            } else {
              Write-Host "   [!!] WARNING: No Contributor/Owner role detected" -ForegroundColor Yellow
              Write-Host "   You may encounter permission errors during deployment." -ForegroundColor Yellow
              Write-Host "   Required: Contributor + User Access Administrator" -ForegroundColor Gray
              $hasErrors = $false  # warning only, don't block
            }
          } else {
            Write-Host "   [--] Skipped (service principal or managed identity)" -ForegroundColor Gray
          }

          # ── 3. Azure CLI Extensions ──────────────────────────────
          Write-Host ""
          Write-Host " [3/7] Checking Azure CLI extensions..." -ForegroundColor White
          $requiredExts = @(
            @{ Name = "containerapp"; Desc = "Container Apps" }
          )
          foreach ($ext in $requiredExts) {
            $ErrorActionPreference = 'SilentlyContinue'
            $installed = az extension show --name $ext.Name --query "name" -o tsv 2>$null
            $ErrorActionPreference = 'Continue'
            if ($installed) {
              Write-Host "   [OK] $($ext.Desc) ($($ext.Name))" -ForegroundColor Green
            } else {
              Write-Host "   [..] Installing $($ext.Desc) ($($ext.Name))..." -ForegroundColor Yellow -NoNewline
              az extension add --name $ext.Name --yes 2>$null
              if ($LASTEXITCODE -eq 0) {
                Write-Host " OK" -ForegroundColor Green
              } else {
                Write-Host " FAILED" -ForegroundColor Red
                $hasErrors = $true
              }
            }
          }

          # ── 4. Dockerfile Validation ─────────────────────────────
          Write-Host ""
          Write-Host " [4/7] Checking project files..." -ForegroundColor White
          $missingFiles = @()
          if (!(Test-Path "./backend/Dockerfile"))  { $missingFiles += "backend/Dockerfile" }
          if (!(Test-Path "./frontend/Dockerfile"))  { $missingFiles += "frontend/Dockerfile" }
          if (!(Test-Path "./backend/requirements.txt")) { $missingFiles += "backend/requirements.txt" }
          if (!(Test-Path "./frontend/package.json")) { $missingFiles += "frontend/package.json" }
          if (!(Test-Path "./infra/main.bicep"))     { $missingFiles += "infra/main.bicep" }
          if ($missingFiles.Count -eq 0) {
            Write-Host "   [OK] All required project files present" -ForegroundColor Green
          } else {
            foreach ($f in $missingFiles) {
              Write-Host "   [!!] Missing: $f" -ForegroundColor Red
            }
            Write-Host "   Ensure you are running azd up from the repository root." -ForegroundColor Yellow
            $hasErrors = $true
          }

          # ── 5. Soft-Deleted Key Vault Check ──────────────────────
          Write-Host ""
          Write-Host " [5/7] Checking for soft-deleted Key Vaults..." -ForegroundColor White
          $ErrorActionPreference = 'SilentlyContinue'
          $envName = azd env get-value AZURE_ENV_NAME 2>$null
          $deletedVaults = az keyvault list-deleted --query "[?contains(name, '$envName')].{name:name, location:properties.location}" -o tsv 2>$null
          $ErrorActionPreference = 'Continue'
          if ($deletedVaults) {
            Write-Host "   [!!] WARNING: Soft-deleted Key Vault found matching '$envName'" -ForegroundColor Yellow
            Write-Host "   This may cause deployment failures. To fix:" -ForegroundColor Yellow
            Write-Host "   az keyvault purge --name <vault-name>" -ForegroundColor Gray
            Write-Host "   Or use a different environment name: azd env new <new-name>" -ForegroundColor Gray
          } else {
            Write-Host "   [OK] No conflicting soft-deleted Key Vaults" -ForegroundColor Green
          }

          # ── 6. Resource Providers ────────────────────────────────
          Write-Host ""
          Write-Host " [6/7] Checking resource providers..." -ForegroundColor White
          $providers = @(
            @{ Name = "Microsoft.App";                     Desc = "Container Apps" },
            @{ Name = "Microsoft.ContainerRegistry";       Desc = "Container Registry" },
            @{ Name = "Microsoft.CognitiveServices";        Desc = "Microsoft Foundry" },
            @{ Name = "Microsoft.OperationalInsights";     Desc = "Log Analytics" },
            @{ Name = "Microsoft.Insights";                Desc = "Application Insights" }
          )

          $providerIssues = @()
          foreach ($p in $providers) {
            $state = az provider show -n $p.Name --query "registrationState" -o tsv 2>$null
            if ($state -eq "Registered") {
              Write-Host "   [OK] $($p.Desc) ($($p.Name))" -ForegroundColor Green
            } else {
              Write-Host "   [!!] $($p.Desc) ($($p.Name)) - $state" -ForegroundColor Red
              $providerIssues += $p
            }
          }

          # Auto-register unregistered providers
          if ($providerIssues.Count -gt 0) {
            Write-Host ""
            Write-Host " Registering missing providers..." -ForegroundColor Yellow
            foreach ($p in $providerIssues) {
              Write-Host "   Registering $($p.Name)..." -ForegroundColor White -NoNewline
              az provider register -n $p.Name --wait 2>$null
              $state = az provider show -n $p.Name --query "registrationState" -o tsv 2>$null
              if ($state -eq "Registered") {
                Write-Host " OK" -ForegroundColor Green
              } else {
                Write-Host " FAILED ($state)" -ForegroundColor Red
                Write-Host ""
                Write-Host " ERROR: Cannot register $($p.Name)." -ForegroundColor Red
                Write-Host " You may need 'Contributor' or 'Owner' role on the subscription." -ForegroundColor Yellow
                Write-Host ""
                exit 1
              }
            }
          }

          # ── 7. Resource Quotas ───────────────────────────────
          Write-Host ""
          Write-Host " [7/7] Checking resource quotas..." -ForegroundColor White

          $ErrorActionPreference = 'SilentlyContinue'
          $caEnvUsage = az containerapp env list --query "length([?location=='$region'])" -o tsv 2>$null
          $ErrorActionPreference = 'Continue'
          if ($null -eq $caEnvUsage) { $caEnvUsage = 0 }
          $caEnvLimit = 15
          $caEnvRemaining = $caEnvLimit - [int]$caEnvUsage

          # Check Container Registry quota
          $ErrorActionPreference = 'SilentlyContinue'
          $acrUsage = az acr list --query "length([?location=='$region'])" -o tsv 2>$null
          $ErrorActionPreference = 'Continue'
          if ($null -eq $acrUsage) { $acrUsage = 0 }

          # Check Foundry (CognitiveServices) quota
          $ErrorActionPreference = 'SilentlyContinue'
          $mlUsage = az cognitiveservices account list --query "length([?location=='$region'])" -o tsv 2>$null
          $ErrorActionPreference = 'Continue'
          if ($null -eq $mlUsage) { $mlUsage = 0 }

          # Display quota summary
          $acrLimit = 50
          $mlLimit = 50
          Write-Host ""
          Write-Host " Resource Quota Summary ($region):" -ForegroundColor Yellow
          Write-Host " ┌────────────────────────────────┬────────┬───────────┬────────┐" -ForegroundColor Gray
          Write-Host " │ Resource                       │ In Use │ Available │ Status │" -ForegroundColor Gray
          Write-Host " ├────────────────────────────────┼────────┼───────────┼────────┤" -ForegroundColor Gray

          # Container Apps Environments
          if ($caEnvRemaining -gt 0) {
            Write-Host " │ Container Apps Environments    │ $($caEnvUsage.ToString().PadLeft(6)) │ $($caEnvRemaining.ToString().PadLeft(6))/$caEnvLimit │  " -ForegroundColor Gray -NoNewline
            Write-Host "OK" -ForegroundColor Green -NoNewline
            Write-Host "  │" -ForegroundColor Gray
          } else {
            Write-Host " │ Container Apps Environments    │ $($caEnvUsage.ToString().PadLeft(6)) │      0/$caEnvLimit │ " -ForegroundColor Gray -NoNewline
            Write-Host "FULL" -ForegroundColor Red -NoNewline
            Write-Host " │" -ForegroundColor Gray
          }

          # Container Registries
          $acrRemaining = $acrLimit - [int]$acrUsage
          Write-Host " │ Container Registries           │ $($acrUsage.ToString().PadLeft(6)) │ $($acrRemaining.ToString().PadLeft(6))/$acrLimit │  " -ForegroundColor Gray -NoNewline
          Write-Host "OK" -ForegroundColor Green -NoNewline
          Write-Host "  │" -ForegroundColor Gray

          # Foundry Resources
          $mlRemaining = $mlLimit - [int]$mlUsage
          Write-Host " │ Foundry Resources               │ $($mlUsage.ToString().PadLeft(6)) │ $($mlRemaining.ToString().PadLeft(6))/$mlLimit │  " -ForegroundColor Gray -NoNewline
          Write-Host "OK" -ForegroundColor Green -NoNewline
          Write-Host "  │" -ForegroundColor Gray

          Write-Host " └────────────────────────────────┴────────┴───────────┴────────┘" -ForegroundColor Gray

          if ($caEnvRemaining -le 0) {
            Write-Host ""
            Write-Host " WARNING: Container Apps Environment quota may be exhausted!" -ForegroundColor Red
            Write-Host " You have $caEnvUsage/$caEnvLimit environments in $region." -ForegroundColor Yellow
            Write-Host " Delete unused environments or request a quota increase." -ForegroundColor Yellow
            Write-Host " Azure Portal: https://portal.azure.com/#view/Microsoft_Azure_Capacity/QuotaMenuBlade" -ForegroundColor Gray
            Write-Host ""
          }

          # Error summary
          if ($hasErrors) {
            Write-Host ""
            Write-Host " [!!] Some checks failed. Deployment may not succeed." -ForegroundColor Red
            Write-Host " Review warnings above before proceeding." -ForegroundColor Yellow
          } else {
            Write-Host ""
            Write-Host " All pre-deployment checks passed!" -ForegroundColor Green
          }

          # Resources to be created
          Write-Host ""
          Write-Host " Resources to be created:" -ForegroundColor Yellow
          Write-Host "   • Resource Group" -ForegroundColor White
          Write-Host "   • Microsoft Foundry Resource + Project" -ForegroundColor White
          Write-Host "   • Container Registry" -ForegroundColor White
          Write-Host "   • Container Apps Environment" -ForegroundColor White
          Write-Host "   • Backend Container App (Python/FastAPI)" -ForegroundColor White
          Write-Host "   • Frontend Container App (Next.js/nginx)" -ForegroundColor White
          Write-Host "   • Log Analytics + Application Insights" -ForegroundColor White
          Write-Host ""
          Write-Host "===============================================================" -ForegroundColor Yellow

          # Ask for confirmation
          $confirm = Read-Host " Proceed with deployment? (Y/n)"
          if ($confirm -and $confirm -notin @('y', 'Y', 'yes', 'Yes', 'YES', '')) {
            Write-Host ""
            Write-Host " Deployment cancelled by user." -ForegroundColor Yellow
            Write-Host ""
            exit 1
          }
          Write-Host ""
        }

        # Always provision with placeholder images; postprovision builds real ones
        azd env set IMAGES_BUILT false
      shell: pwsh
      interactive: true
    posix:
      run: |
        # ── Region Validation ────────────────────────────────────────
        REGION=$(azd env get-value AZURE_LOCATION 2>/dev/null)
        if [ -n "$REGION" ] && [ "$REGION" != "eastus2" ] && [ "$REGION" != "swedencentral" ]; then
          Red='\033[0;31m'
          Yellow='\033[1;33m'
          Cyan='\033[0;36m'
          White='\033[1;37m'
          Gray='\033[0;90m'
          NC='\033[0m'
          printf "\n"
          printf "${Red}===============================================================\n"
          printf "${Red} REGION NOT SUPPORTED\n"
          printf "${Red}===============================================================${NC}\n\n"
          printf "${Yellow} You selected region: %s${NC}\n\n" "$REGION"
          printf "${White} Claude models on Microsoft Foundry are only available in:${NC}\n"
          printf "${Cyan}   - East US 2      (eastus2)${NC}\n"
          printf "${Cyan}   - Sweden Central (swedencentral)${NC}\n\n"
          printf "${White} Please run 'azd env new' and select a supported region,${NC}\n"
          printf "${White} or change region with: azd env set AZURE_LOCATION eastus2${NC}\n\n"
          printf "${Gray} Learn more: https://learn.microsoft.com/en-us/azure/foundry/foundry-models/how-to/use-foundry-models-claude${NC}\n\n"
          exit 1
        fi

        # ── Pre-Deployment Verification ────────────────────────────
        if [ -n "$REGION" ]; then
          Green='\033[0;32m'
          Yellow='\033[1;33m'
          Red='\033[0;31m'
          White='\033[1;37m'
          Cyan='\033[0;36m'
          Gray='\033[0;90m'
          NC='\033[0m'
          HAS_ERRORS=0

          printf "\n"
          printf "${Yellow}===============================================================\n"
          printf "${Green} PRE-DEPLOYMENT VERIFICATION\n"
          printf "${Yellow}===============================================================${NC}\n\n"

          # ── 1. Azure CLI Login & Token Validity ──────────────────
          printf "${White} [1/7] Checking Azure CLI authentication...${NC}\n"
          if ! az account get-access-token --query "expiresOn" -o tsv >/dev/null 2>&1; then
            printf "${Red}   [!!] Azure CLI token expired or not logged in${NC}\n"
            printf "${Yellow}   Run: az login${NC}\n\n"
            exit 1
          fi
          SUB_ID=$(az account show --query "id" -o tsv 2>/dev/null)
          SUB_NAME=$(az account show --query "name" -o tsv 2>/dev/null)
          SUB_STATE=$(az account show --query "state" -o tsv 2>/dev/null)
          printf "${Green}   [OK] Logged in${NC}\n"
          printf "${Gray}   Subscription: %s${NC}\n" "$SUB_NAME"
          printf "${Gray}   Region:       %s${NC}\n" "$REGION"

          if [ "$SUB_STATE" != "Enabled" ]; then
            printf "\n${Red}   [!!] Subscription state: %s${NC}\n" "$SUB_STATE"
            printf "${Yellow}   Your subscription must be in 'Enabled' state to deploy.${NC}\n"
            printf "${Gray}   Check: https://portal.azure.com/#view/Microsoft_Azure_Billing/SubscriptionsBlade${NC}\n\n"
            exit 1
          fi

          # ── 2. Role Assignment Check ─────────────────────────────
          printf "\n${White} [2/7] Checking permissions...${NC}\n"
          USER_OID=$(az ad signed-in-user show --query "id" -o tsv 2>/dev/null || true)
          if [ -n "$USER_OID" ]; then
            ROLES=$(az role assignment list --assignee "$USER_OID" --subscription "$SUB_ID" --query "[].roleDefinitionName" -o tsv 2>/dev/null || true)
            if echo "$ROLES" | grep -qE "Owner|Contributor"; then
              printf "${Green}   [OK] Sufficient permissions (Contributor or Owner)${NC}\n"
            else
              printf "${Yellow}   [!!] WARNING: No Contributor/Owner role detected${NC}\n"
              printf "${Yellow}   You may encounter permission errors during deployment.${NC}\n"
              printf "${Gray}   Required: Contributor + User Access Administrator${NC}\n"
            fi
          else
            printf "${Gray}   [--] Skipped (service principal or managed identity)${NC}\n"
          fi

          # ── 3. Azure CLI Extensions ──────────────────────────────
          printf "\n${White} [3/7] Checking Azure CLI extensions...${NC}\n"
          for EXT_INFO in "containerapp|Container Apps"; do
            EXT_NAME=$(echo "$EXT_INFO" | cut -d'|' -f1)
            EXT_DESC=$(echo "$EXT_INFO" | cut -d'|' -f2)
            if az extension show --name "$EXT_NAME" --query "name" -o tsv >/dev/null 2>&1; then
              printf "${Green}   [OK] %s (%s)${NC}\n" "$EXT_DESC" "$EXT_NAME"
            else
              printf "${Yellow}   [..] Installing %s (%s)...${NC}" "$EXT_DESC" "$EXT_NAME"
              if az extension add --name "$EXT_NAME" --yes >/dev/null 2>&1; then
                printf "${Green} OK${NC}\n"
              else
                printf "${Yellow} SKIPPED (install requires newer az CLI)${NC}\n"
              fi
            fi
          done

          # ── 4. Dockerfile Validation ─────────────────────────────
          printf "\n${White} [4/7] Checking project files...${NC}\n"
          FILES_OK=1
          for FILE in "backend/Dockerfile" "frontend/Dockerfile" "backend/requirements.txt" "frontend/package.json" "infra/main.bicep"; do
            if [ ! -f "./$FILE" ]; then
              printf "${Red}   [!!] Missing: %s${NC}\n" "$FILE"
              FILES_OK=0
              HAS_ERRORS=1
            fi
          done
          if [ "$FILES_OK" = "1" ]; then
            printf "${Green}   [OK] All required project files present${NC}\n"
          else
            printf "${Yellow}   Ensure you are running azd up from the repository root.${NC}\n"
          fi

          # ── 5. Soft-Deleted Key Vault Check ──────────────────────
          printf "\n${White} [5/7] Checking for soft-deleted Key Vaults...${NC}\n"
          ENV_NAME=$(azd env get-value AZURE_ENV_NAME 2>/dev/null)
          DELETED_VAULTS=$(az keyvault list-deleted --query "[?contains(name, '$ENV_NAME')].name" -o tsv 2>/dev/null || true)
          if [ -n "$DELETED_VAULTS" ]; then
            printf "${Yellow}   [!!] WARNING: Soft-deleted Key Vault found matching '%s'${NC}\n" "$ENV_NAME"
            printf "${Yellow}   This may cause deployment failures. To fix:${NC}\n"
            printf "${Gray}   az keyvault purge --name <vault-name>${NC}\n"
            printf "${Gray}   Or use a different environment name: azd env new <new-name>${NC}\n"
          else
            printf "${Green}   [OK] No conflicting soft-deleted Key Vaults${NC}\n"
          fi

          # ── 6. Resource Providers ────────────────────────────────
          printf "\n${White} [6/7] Checking resource providers...${NC}\n"
          PROVIDER_FAILED=0
          for PROVIDER_INFO in \
            "Microsoft.App|Container Apps" \
            "Microsoft.ContainerRegistry|Container Registry" \
            "Microsoft.CognitiveServices|Microsoft Foundry" \
            "Microsoft.OperationalInsights|Log Analytics" \
            "Microsoft.Insights|Application Insights"; do

            PNAME=$(echo "$PROVIDER_INFO" | cut -d'|' -f1)
            PDESC=$(echo "$PROVIDER_INFO" | cut -d'|' -f2)
            STATE=$(az provider show -n "$PNAME" --query "registrationState" -o tsv 2>/dev/null || true)

            if [ "$STATE" = "Registered" ]; then
              printf "${Green}   [OK] %s (%s)${NC}\n" "$PDESC" "$PNAME"
            else
              printf "${Red}   [!!] %s (%s) - %s${NC}\n" "$PDESC" "$PNAME" "$STATE"
              printf "${Yellow}   Registering %s...${NC}" "$PNAME"
              az provider register -n "$PNAME" --wait 2>/dev/null || true
              STATE=$(az provider show -n "$PNAME" --query "registrationState" -o tsv 2>/dev/null || true)
              if [ "$STATE" = "Registered" ]; then
                printf "${Green} OK${NC}\n"
              else
                printf "${Red} FAILED (%s)${NC}\n" "$STATE"
                printf "\n${Red} ERROR: Cannot register %s.${NC}\n" "$PNAME"
                printf "${Yellow} You may need 'Contributor' or 'Owner' role on the subscription.${NC}\n\n"
                PROVIDER_FAILED=1
              fi
            fi
          done

          if [ "$PROVIDER_FAILED" = "1" ]; then
            exit 1
          fi

          # ── 7. Resource Quotas ───────────────────────────────
          printf "\n${White} [7/7] Checking resource quotas...${NC}\n"

          # Only check quotas if required CLI extensions are available
          if az extension show --name containerapp >/dev/null 2>&1; then
            CA_ENV_USAGE=$(az containerapp env list --query "length([?location=='$REGION'])" -o tsv 2>/dev/null || echo "0")
          else
            CA_ENV_USAGE="N/A"
          fi
          ACR_USAGE=$(az acr list --query "length([?location=='$REGION'])" -o tsv 2>/dev/null || echo "0")
          ML_USAGE=$(az cognitiveservices account list --query "length([?location=='$REGION'])" -o tsv 2>/dev/null || echo "0")
          CA_ENV_LIMIT=15

          # Display quota summary
          ACR_LIMIT=50
          ML_LIMIT=50
          printf "\n${Yellow} Resource Quota Summary (%s):${NC}\n" "$REGION"
          printf "${Gray} ┌────────────────────────────────┬────────┬───────────┬────────┐${NC}\n"
          printf "${Gray} │ Resource                       │ In Use │ Available │ Status │${NC}\n"
          printf "${Gray} ├────────────────────────────────┼────────┼───────────┼────────┤${NC}\n"

          if [ "$CA_ENV_USAGE" = "N/A" ]; then
            printf "${Gray} │ Container Apps Environments    │    N/A │       N/A │ ${Yellow}SKIP${Gray} │${NC}\n"
            CA_REMAINING=1  # assume OK
          else
            CA_REMAINING=$((CA_ENV_LIMIT - CA_ENV_USAGE))
            if [ "$CA_REMAINING" -gt 0 ]; then
              printf "${Gray} │ Container Apps Environments    │ %6s │ %6s/%s │  ${Green}OK${Gray}  │${NC}\n" "$CA_ENV_USAGE" "$CA_REMAINING" "$CA_ENV_LIMIT"
            else
              printf "${Gray} │ Container Apps Environments    │ %6s │ %6s/%s │ ${Red}FULL${Gray} │${NC}\n" "$CA_ENV_USAGE" "0" "$CA_ENV_LIMIT"
            fi
          fi
          if [ "$ACR_USAGE" = "N/A" ]; then
            printf "${Gray} │ Container Registries           │    N/A │       N/A │ ${Yellow}SKIP${Gray} │${NC}\n"
          else
            ACR_REMAINING=$((ACR_LIMIT - ACR_USAGE))
            printf "${Gray} │ Container Registries           │ %6s │ %6s/%s │  ${Green}OK${Gray}  │${NC}\n" "$ACR_USAGE" "$ACR_REMAINING" "$ACR_LIMIT"
          fi
          if [ "$ML_USAGE" = "N/A" ]; then
            printf "${Gray} │ Foundry Resources               │    N/A │       N/A │ ${Yellow}SKIP${Gray} │${NC}\n"
          else
            ML_REMAINING=$((ML_LIMIT - ML_USAGE))
            printf "${Gray} │ Foundry Resources               │ %6s │ %6s/%s │  ${Green}OK${Gray}  │${NC}\n" "$ML_USAGE" "$ML_REMAINING" "$ML_LIMIT"
          fi
          printf "${Gray} └────────────────────────────────┴────────┴───────────┴────────┘${NC}\n"

          if [ "$CA_REMAINING" -le 0 ]; then
            printf "\n${Red} WARNING: Container Apps Environment quota may be exhausted!${NC}\n"
            printf "${Yellow} You have %s/%s environments in %s.${NC}\n" "$CA_ENV_USAGE" "$CA_ENV_LIMIT" "$REGION"
            printf "${Yellow} Delete unused environments or request a quota increase.${NC}\n"
            printf "${Gray} Azure Portal: https://portal.azure.com/#view/Microsoft_Azure_Capacity/QuotaMenuBlade${NC}\n\n"
          fi

          # Error summary
          if [ "$HAS_ERRORS" = "1" ]; then
            printf "\n${Red} [!!] Some checks failed. Deployment may not succeed.${NC}\n"
            printf "${Yellow} Review warnings above before proceeding.${NC}\n"
          else
            printf "\n${Green} All pre-deployment checks passed!${NC}\n"
          fi

          # Resources to be created
          printf "\n${Yellow} Resources to be created:${NC}\n"
          printf "   • Resource Group\n"
          printf "   • Microsoft Foundry Resource + Project\n"
          printf "   • Container Registry\n"
          printf "   • Container Apps Environment\n"
          printf "   • Backend Container App (Python/FastAPI)\n"
          printf "   • Frontend Container App (Next.js/nginx)\n"
          printf "   • Log Analytics + Application Insights\n"
          printf "\n${Yellow}===============================================================${NC}\n"

          # Ask for confirmation
          printf " Proceed with deployment? (Y/n) "
          read -r CONFIRM
          if [ -n "$CONFIRM" ] && [ "$CONFIRM" != "y" ] && [ "$CONFIRM" != "Y" ] && [ "$CONFIRM" != "yes" ]; then
            printf "\n${Yellow} Deployment cancelled by user.${NC}\n\n"
            exit 1
          fi
          printf "\n"
        fi

        azd env set IMAGES_BUILT false
      shell: sh
      interactive: true

  postprovision:
    windows:
      run: |
        Write-Host ""
        Write-Host "===============================================================" -ForegroundColor Yellow
        Write-Host " BUILDING CONTAINER IMAGES (remote ACR build)" -ForegroundColor Green
        Write-Host "===============================================================" -ForegroundColor Yellow

        $acrEndpoint = azd env get-value AZURE_CONTAINER_REGISTRY_ENDPOINT
        $acrName     = $acrEndpoint -replace '\.azurecr\.io$', ''
        $rgName      = azd env get-value AZURE_RESOURCE_GROUP
        $backendApp  = azd env get-value BACKEND_CONTAINER_APP_NAME
        $frontendApp = azd env get-value FRONTEND_CONTAINER_APP_NAME

        Write-Host ""
        Write-Host "  Building backend on ACR ($acrName)..." -ForegroundColor White
        $ErrorActionPreference = 'SilentlyContinue'
        $backendBuild = az acr build --registry $acrName --image backend:latest --platform linux/amd64 ./backend --no-logs 2>&1
        $backendExit = $LASTEXITCODE
        $ErrorActionPreference = 'Continue'
        if ($backendExit -ne 0) { Write-Host "  ERROR: Backend build failed!" -ForegroundColor Red; exit 1 }
        Write-Host "  Backend image built successfully" -ForegroundColor Green

        Write-Host "  Building frontend on ACR ($acrName)..." -ForegroundColor White
        $ErrorActionPreference = 'SilentlyContinue'
        $frontendBuild = az acr build --registry $acrName --image frontend:latest --platform linux/amd64 ./frontend --no-logs 2>&1
        $frontendExit = $LASTEXITCODE
        $ErrorActionPreference = 'Continue'
        if ($frontendExit -ne 0) { Write-Host "  ERROR: Frontend build failed!" -ForegroundColor Red; exit 1 }
        Write-Host "  Frontend image built successfully" -ForegroundColor Green

        Write-Host ""
        Write-Host "  Updating backend container app..." -ForegroundColor White
        $ErrorActionPreference = 'SilentlyContinue'
        az containerapp update --name $backendApp --resource-group $rgName --image "$acrEndpoint/backend:latest" --output none 2>&1 | Out-Null
        az containerapp update --name $frontendApp --resource-group $rgName --image "$acrEndpoint/frontend:latest" --output none 2>&1 | Out-Null
        $ErrorActionPreference = 'Continue'
        Write-Host "  Updating frontend container app..." -ForegroundColor White

        # Mark images as built so subsequent provisions use ACR images directly
        azd env set IMAGES_BUILT true

        Write-Host ""
        Write-Host "===============================================================" -ForegroundColor Yellow
        Write-Host " DEPLOYMENT COMPLETE" -ForegroundColor Green
        Write-Host "===============================================================" -ForegroundColor Yellow
        Write-Host ""
        Write-Host " Next Steps:" -ForegroundColor White
        Write-Host "  1. Deploy Claude Sonnet 4.6 in Microsoft Foundry portal" -ForegroundColor White
        Write-Host "  2. Set credentials:" -ForegroundColor White
        Write-Host "     azd env set AZURE_FOUNDRY_API_KEY <your-api-key>" -ForegroundColor Gray
        Write-Host "     azd env set AZURE_FOUNDRY_ENDPOINT <your-endpoint>" -ForegroundColor Gray
        Write-Host "  3. Redeploy: azd up" -ForegroundColor White
        Write-Host ""
        $frontendUrl = azd env get-value frontendUrl
        $backendUrl  = azd env get-value backendUrl
        Write-Host " Application URLs:" -ForegroundColor Yellow
        Write-Host "  Frontend:  https://$frontendUrl" -ForegroundColor Cyan
        Write-Host "  Backend:   https://$backendUrl" -ForegroundColor Cyan
        Write-Host ""
        Write-Host " To submit a Prior Authorization request:" -ForegroundColor Green
        Write-Host "  1. Open the Frontend URL above in your browser" -ForegroundColor White
        Write-Host "  2. Click 'Load Sample Case' to populate the form" -ForegroundColor White
        Write-Host "  3. Click 'Submit for Review' to start the multi-agent review" -ForegroundColor White
        Write-Host ""
        Write-Host " Backend Health Check: https://$backendUrl/health" -ForegroundColor Gray
        Write-Host ""
      shell: pwsh
      interactive: true
    posix:
      run: |
        Green='\033[0;32m'
        Yellow='\033[1;33m'
        Blue='\033[0;34m'
        Red='\033[0;31m'
        White='\033[1;37m'
        NC='\033[0m'

        printf "\n"
        printf "${Yellow}===============================================================\n"
        printf "${Green} BUILDING CONTAINER IMAGES (remote ACR build)\n"
        printf "${Yellow}===============================================================${NC}\n"

        ACR_ENDPOINT=$(azd env get-value AZURE_CONTAINER_REGISTRY_ENDPOINT)
        ACR_NAME=$(echo "$ACR_ENDPOINT" | sed 's/\.azurecr\.io$//')
        RG_NAME=$(azd env get-value AZURE_RESOURCE_GROUP)
        BACKEND_APP=$(azd env get-value BACKEND_CONTAINER_APP_NAME)
        FRONTEND_APP=$(azd env get-value FRONTEND_CONTAINER_APP_NAME)

        printf "\n${White}  Building backend on ACR (%s)...${NC}\n" "$ACR_NAME"
        az acr build --registry "$ACR_NAME" --image backend:latest --platform linux/amd64 ./backend --no-logs 2>/dev/null
        if [ $? -ne 0 ]; then printf "${Red}  ERROR: Backend build failed!${NC}\n"; exit 1; fi
        printf "${Green}  Backend image built successfully${NC}\n"

        printf "${White}  Building frontend on ACR (%s)...${NC}\n" "$ACR_NAME"
        az acr build --registry "$ACR_NAME" --image frontend:latest --platform linux/amd64 ./frontend --no-logs 2>/dev/null
        if [ $? -ne 0 ]; then printf "${Red}  ERROR: Frontend build failed!${NC}\n"; exit 1; fi
        printf "${Green}  Frontend image built successfully${NC}\n"

        printf "\n${White}  Updating backend container app...${NC}\n"
        az containerapp update --name "$BACKEND_APP" --resource-group "$RG_NAME" --image "$ACR_ENDPOINT/backend:latest" --output none 2>/dev/null
        printf "${White}  Updating frontend container app...${NC}\n"
        az containerapp update --name "$FRONTEND_APP" --resource-group "$RG_NAME" --image "$ACR_ENDPOINT/frontend:latest" --output none 2>/dev/null

        azd env set IMAGES_BUILT true

        printf "\n"
        printf "${Yellow}===============================================================\n"
        printf "${Green} DEPLOYMENT COMPLETE\n"
        printf "${Yellow}===============================================================${NC}\n\n"
        printf "${White} Next Steps:${NC}\n"
        printf "  1. Deploy Claude Sonnet 4.6 in Microsoft Foundry portal\n"
        printf "  2. Set credentials:\n"
        printf "${Gray}     azd env set AZURE_FOUNDRY_API_KEY <your-api-key>${NC}\n"
        printf "${Gray}     azd env set AZURE_FOUNDRY_ENDPOINT <your-endpoint>${NC}\n"
        printf "  3. Redeploy: azd up\n\n"
        FRONTEND_URL=$(azd env get-value frontendUrl)
        BACKEND_URL=$(azd env get-value backendUrl)
        printf "${Yellow} Application URLs:${NC}\n"
        printf "${Blue}  Frontend:  https://%s${NC}\n" "$FRONTEND_URL"
        printf "${Blue}  Backend:   https://%s${NC}\n\n" "$BACKEND_URL"
        printf "${Green} To submit a Prior Authorization request:${NC}\n"
        printf "  1. Open the Frontend URL above in your browser\n"
        printf "  2. Click 'Load Sample Case' to populate the form\n"
        printf "  3. Click 'Submit for Review' to start the multi-agent review\n\n"
        printf "${Gray} Backend Health Check: https://%s/health${NC}\n\n" "$BACKEND_URL"
      shell: sh
      interactive: true
